<!DOCTYPE html>
<html>
<head>
<title>Honda Bank Admin Login</title>
<link rel="stylesheet" href="style.css">

<style>
body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
padding-top:100px;
}

.login-box{
background:white;
width:300px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px #999;
}

input{
width:90%;
padding:10px;
margin:8px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:95%;
padding:10px;
background:#0066cc;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#004999;
}

h1{
color:#333;
}
</style>

</head>

<body>

<div class="login-box">

<h1>Honda Bank</h1>
<h3>Admin Login</h3>

<input id="user" placeholder="Admin Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="msg" style="color:red;"></p>

</div>

<script>

function login(){

var u = document.getElementById("user").value;
var p = document.getElementById("pass").value;

if(u === "admin" && p === "1234")
{
window.location.href = "dashboard.html";
}
else
{
document.getElementById("msg").innerText = "❌ Wrong Username or Password";
}

}

</script>

</body>
</html>
