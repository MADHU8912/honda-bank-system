<!DOCTYPE html>
<html>
<head>
<title>Honda Bank Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</head>

<body onload="loadAccounts()">

<h1>Honda Bank Dashboard</h1>

<h3>Create Account</h3>

<input id="name" placeholder="Customer Name"><br><br>
<input id="branch" placeholder="Branch"><br><br>
<input id="balance" placeholder="Balance"><br><br>

<button onclick="createAccount()">Create Account</button>

<hr>

<h3>Search Account</h3>

<input id="search" placeholder="Account Number">
<button onclick="searchAccount()">Search</button>

<div id="result"></div>

<hr>

<table border="1" width="80%" align="center">

<tr>
<th>Account</th>
<th>Name</th>
<th>Branch</th>
<th>Balance</th>
<th>Action</th>
</tr>

<tbody id="accounts"></tbody>

</table>

</body>
</html>
