<!DOCTYPE html>
<html>
<head>
<title>LVR Worknet Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>LVR WORKNET ADMIN PANEL</h1>

<div class="box">

<h3>Create Account</h3>

<input id="name" placeholder="Customer Name"><br><br>
<input id="branch" placeholder="Branch"><br><br>
<input id="balance" placeholder="Balance"><br><br>

<button onclick="createAccount()">Create Account</button>

</div>

<hr>

<h3>Accounts</h3>

<table border="1" width="80%" align="center">

<tr>
<th>Account</th>
<th>Name</th>
<th>Branch</th>
<th>Balance</th>
</tr>

<tbody id="accounts"></tbody>

</table>

<script>

let acc = 1000;

// Auto create 100 customers
window.onload = function () {

let table = document.getElementById("accounts");

for(let i=1;i<=100;i++){

acc++;

let row=`
<tr>
<td>${acc}</td>
<td>Customer ${i}</td>
<td>Main Branch</td>
<td>${1000 + (i*50)}</td>
</tr>
`;

table.innerHTML += row;

}

};

function createAccount(){

let name=document.getElementById("name").value;
let branch=document.getElementById("branch").value;
let balance=document.getElementById("balance").value;

acc++;

let table=document.getElementById("accounts");

let row=`
<tr>
<td>${acc}</td>
<td>${name}</td>
<td>${branch}</td>
<td>${balance}</td>
</tr>
`;

table.innerHTML += row;

}

</script>

</body>
</html>
<hr>

<div class="box">
<h3>Fund Transfer</h3>

<input id="fromAcc" placeholder="From Account Number"><br><br>
<input id="toAcc" placeholder="To Account Number"><br><br>
<input id="amount" placeholder="Amount"><br><br>
  <h3>Fund Transfer</h3>

<input type="number" id="fromAccount" placeholder="From Account Number"><br><br>

<input type="number" id="toAccount" placeholder="To Account Number"><br><br>

<input type="number" id="transferAmount" placeholder="Amount"><br><br>

<button onclick="fundTransfer()">Transfer</button>

<button onclick="transfer()">Transfer</button>

</div>
